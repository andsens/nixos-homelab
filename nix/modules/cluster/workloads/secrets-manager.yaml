---
apiVersion: v1
kind: Namespace
metadata:
  name: secrets-manager
---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: secrets-manager
  name: secrets-manager
  labels:
    app.kubernetes.io/name: secrets-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secrets-manager
  labels:
    app.kubernetes.io/name: secrets-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secrets-manager
subjects:
- kind: ServiceAccount
  namespace: secrets-manager
  name: secrets-manager
