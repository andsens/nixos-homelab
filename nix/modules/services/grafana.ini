[log]
mode = console
[users]
allow_sign_up = false
auto_assign_org = true
auto_assign_org_role = Admin
[auth]
disable_login_form = true
[auth.proxy]
enabled = true
header_name = X-WEBAUTH-USER
header_property = username
headers = Role:X-WEBAUTH-ROLE
auto_sign_up = true
[database]
type = postgres
host = postgresql.postgresql:5432
name = grafana
user = grafana
password = grafana
[plugins]
provisioning = /etc/grafana/provisioning
[alerting]
enabled = false
[unified_alerting]
enabled = true
